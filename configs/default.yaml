agent:
  max_steps: 200
  fallback_compaction_limit: 100000
  compaction_token_fraction: 0.75
  default_model: "openrouter/xiaomi/mimo-v2.5-pro"
  compaction_model: "openrouter/xiaomi/mimo-v2.5-pro"
  
  # Configure reasoning/thinking toggles here.
  # For MiniMax M3, use its native thinking parameter:
  #   extra_body: { thinking: { type: "adaptive" } }
  # For DeepSeek V4 Flash, use OpenRouter's universal parameter:
  #   extra_body: { reasoning: { effort: "high" } }
  model_kwargs:
    extra_body:
      thinking:
        type: "adaptive"

paths:
  runs_dir: "runs"
  system_prompt_file: "prompts/system_prompt.txt"
  compaction_prompt_file: "prompts/compaction_prompt.txt"


